<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Cyborg KPI"/>
<meta name="theme-color" content="#1C1C1E"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Cyborg KPI</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#1C1C1E;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#fff;overscroll-behavior:none}
input,textarea,select{-webkit-user-select:auto;user-select:auto;font-family:inherit}
::-webkit-scrollbar{display:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
select option{background:#2C2C2E}
#app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.hdr{padding:52px 20px 0;flex-shrink:0}
.back{background:none;border:none;color:#0A84FF;font-size:16px;padding:0 0 6px;cursor:pointer;display:block;font-family:inherit}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.pg-sub{font-size:12px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin:0 0 2px}
.pg-title{font-size:26px;font-weight:700;color:#fff;margin:0 0 4px}
.add-btn{border:none;border-radius:20px;padding:8px 16px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;margin-top:4px;flex-shrink:0;font-family:inherit}
.content{flex:1;overflow-y:auto;padding:12px 16px 100px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(28,28,30,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid rgba(84,84,88,.5);display:flex;padding:8px 0 28px;z-index:100}
.nb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0 0;font-family:inherit}
.ni{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.nl{font-size:10px;font-weight:500}
.card{background:#2C2C2E;border-radius:20px;padding:16px;margin-bottom:12px}
.card22{border-radius:22px;padding:18px}
.sec{font-size:11px;color:#636366;text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin:0 0 8px 2px}
.lcard{background:#2C2C2E;border-radius:20px;overflow:hidden;margin-bottom:12px}
.li{padding:14px 16px;border-bottom:.5px solid rgba(84,84,88,.5);display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;-webkit-user-select:none}
.li:last-child{border-bottom:none}
.li.dragging{opacity:.3}
.drag-handle{display:flex;flex-direction:column;gap:3px;flex-shrink:0;padding:2px 4px;opacity:.25}
.drag-handle span{display:block;width:14px;height:1.5px;background:#fff;border-radius:1px}
.chev{color:#3A3A3C;font-size:18px;flex-shrink:0}
.bar{background:rgba(84,84,88,.3);border-radius:3px;height:4px;overflow:hidden;margin-top:7px}
.barf{height:100%;border-radius:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:#2C2C2E;border-radius:20px;padding:16px;cursor:pointer}
.inp{width:100%;background:#3A3A3C;border:none;border-radius:10px;padding:10px 12px;font-size:16px;color:#fff;outline:none}
.sel{width:100%;background:#3A3A3C;border:none;border-radius:10px;padding:10px 12px;font-size:16px;color:#fff;outline:none;appearance:none;-webkit-appearance:none}
textarea.inp{resize:none;height:52px;font-size:14px}
.fld{margin-bottom:10px}
.lbl{font-size:12px;color:#636366;font-weight:500;margin:0 0 5px;display:flex;align-items:center;gap:5px}
.ibtn{width:15px;height:15px;border-radius:50%;border:1px solid #48484A;background:none;color:#636366;font-size:9px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1;padding:0}
.sbtn{width:100%;border:none;border-radius:14px;padding:14px 0;font-size:16px;font-weight:600;color:#fff;cursor:pointer;margin-top:8px;font-family:inherit}
.tw{background:#3A3A3C;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.tt{width:46px;height:26px;border-radius:13px;padding:2px;cursor:pointer;flex-shrink:0;transition:background .2s}
.th{width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;z-index:200}
.ms{background:#1C1C1E;border-radius:22px 22px 0 0;width:100%;max-width:430px;margin:0 auto;padding:8px 20px 44px;max-height:90dvh;overflow-y:auto}
.mh{width:36px;height:5px;background:#48484A;border-radius:3px;margin:10px auto 16px}
.mcl{background:#3A3A3C;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;color:#8E8E93;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qb{flex:1;border:none;border-radius:10px;padding:10px 0;font-size:14px;color:#fff;cursor:pointer;font-family:inherit}
.db{background:rgba(255,59,48,.15);border:none;border-radius:8px;padding:6px 10px;font-size:12px;color:#FF453A;cursor:pointer;font-family:inherit;flex-shrink:0}
.mt{background:#3A3A3C;border-radius:6px;padding:3px 8px;font-size:11px;color:#8E8E93;display:inline-block;margin:2px}
.nb2{background:#3A3A3C;border-radius:9px;padding:8px 12px}
.pbar{display:flex;background:#2C2C2E;border-radius:12px;padding:3px;margin-bottom:10px}
.pb{flex:1;border:none;border-radius:9px;padding:7px 0;font-size:13px;cursor:pointer;font-family:inherit}
.tbar{display:flex;background:#2C2C2E;border-radius:12px;padding:3px;margin-bottom:10px}
.tb{flex:1;border:none;border-radius:9px;padding:8px 0;font-size:14px;cursor:pointer;font-family:inherit}
.np{background:#2C2C2E;border-radius:14px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.npb{background:none;border:none;font-size:22px;cursor:pointer;padding:0 6px;line-height:1;font-family:inherit}
.sr{display:grid;grid-template-columns:1fr 80px 80px;padding:9px 12px;align-items:center;border-bottom:.5px solid rgba(84,84,88,.3)}
.sr:last-child{border-bottom:none}
.ec{background:#2C2C2E;border-radius:16px;padding:14px;margin-bottom:8px}
.rw{position:relative;flex-shrink:0}
.rl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zi{display:flex;gap:8px;align-items:center}
.zinp{flex:1;background:#3A3A3C;border:none;border-radius:9px;padding:8px 12px;font-size:16px;color:#fff;outline:none;font-family:inherit}
.zok{border:none;border-radius:9px;padding:8px 16px;font-size:14px;color:#fff;cursor:pointer;font-weight:600;font-family:inherit}
.zcl{background:#3A3A3C;border:none;border-radius:9px;padding:8px 12px;font-size:14px;color:#8E8E93;cursor:pointer;font-family:inherit}
.er{padding:14px 16px;border-bottom:.5px solid rgba(84,84,88,.5);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.er:last-child{border-bottom:none}
.fw{display:flex;gap:8px;flex-wrap:wrap}
.fh{flex:1 1 calc(50% - 4px)}
.bkbanner{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:300;padding:12px 16px;background:rgba(28,28,30,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid rgba(84,84,88,.4);display:flex;align-items:center;gap:10px;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-100%)}to{transform:translateX(-50%) translateY(0)}}
.bkbanner-txt{flex:1;font-size:13px;color:#8E8E93}
.bkbanner-btn{background:#0A84FF;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap}
.bkbanner-cl{background:none;border:none;color:#48484A;font-size:20px;cursor:pointer;padding:0 2px;font-family:inherit;line-height:1}
.rsov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:flex;align-items:center;justify-content:center;padding:24px}
.rsbox{background:#1C1C1E;border-radius:22px;padding:24px;width:100%;max-width:360px;text-align:center}
.infov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:32px}
.infobox{background:#2C2C2E;border-radius:20px;padding:22px;width:100%;max-width:320px}
.infobox h3{font-size:17px;font-weight:700;color:#fff;margin:0 0 8px}
.infobox p{font-size:14px;color:#8E8E93;line-height:1.6;margin:0}
.infocl{width:100%;background:#3A3A3C;border:none;border-radius:12px;padding:11px 0;font-size:15px;color:#fff;cursor:pointer;margin-top:16px;font-family:inherit}
.drag-ghost{position:fixed;z-index:999;pointer-events:none;background:#3A3A3C;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.6);padding:14px 16px;display:flex;align-items:center;gap:12px;width:calc(min(430px,100vw) - 32px);left:16px}
.chart-tip{position:fixed;background:rgba(44,44,46,.97);backdrop-filter:blur(10px);border:1px solid rgba(84,84,88,.5);border-radius:10px;padding:7px 12px;font-size:12px;color:#fff;pointer-events:none;z-index:999;white-space:nowrap;transform:translateX(-50%);transition:opacity .15s}

.pwov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:flex;align-items:center;justify-content:center;padding:32px}
.pwbox{background:#1C1C1E;border-radius:22px;padding:28px 24px;width:100%;max-width:340px;text-align:center}
.pw-inp{width:100%;background:#2C2C2E;border:1.5px solid #3A3A3C;border-radius:12px;padding:14px 16px;font-size:20px;color:#fff;text-align:center;letter-spacing:6px;outline:none;font-family:inherit;margin-bottom:12px}
.pw-inp:focus{border-color:#5E5CE6}
/* PE table */
.pe-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:360px}
.pe-tbl th{text-align:right;padding:8px 5px;color:#636366;font-weight:600;font-size:10px;border-bottom:.5px solid rgba(84,84,88,.5)}
.pe-tbl th:first-child{text-align:left}
.pe-tbl td{text-align:right;padding:8px 5px;border-bottom:.5px solid rgba(84,84,88,.15)}
.pe-tbl td:first-child{text-align:left;color:#8E8E93;white-space:nowrap}
.pe-tbl tr.note-row td{padding:1px 5px 7px;color:#48484A;font-size:10px;font-style:italic}
</style>
</head>
<body>
<div id="app"></div>
<div id="bkbanner" style="display:none" class="bkbanner">
  <span style="font-size:18px">☁️</span>
  <span class="bkbanner-txt">Neuer Eintrag – jetzt in iCloud sichern?</span>
  <button class="bkbanner-btn" id="bkdo">Backup</button>
  <button class="bkbanner-cl" id="bkcl">×</button>
</div>
<input type="file" id="fi" accept=".json" style="display:none"/>
<script>
(function(){
'use strict';

const COL={kraft:'#FF3B30',engine:'#34C759',peak:'#FF9500',skills:'#BF5AF2',struktur:'#0A84FF',recovery:'#32ADE6'};
const SEC_COL={bpsfl:'#5E5CE6',bpel:'#0A84FF',nbel:'#32ADE6',mseg:'#34C759',beg:'#30D158'};
const SM=[{id:'kraft',label:'Kraft',desc:'Relative Strength'},{id:'engine',label:'Engine',desc:'Aerobe Kapazität'},{id:'peak',label:'Peak',desc:'Intervalle'},{id:'skills',label:'Skills',desc:'Nervensystem'},{id:'struktur',label:'Struktur',desc:'Robustheit'},{id:'recovery',label:'Recovery',desc:'Systemstatus'}];

const KPIS={
  kraft:[{k:'pullups',label:'Pull-ups',unit:'Reps',target:10,hb:1},{k:'pikeHSPU',label:'Pike / HSPU',unit:'Reps',target:10,hb:1},{k:'pistolL',label:'Pistol Squat L',unit:'Reps',target:5,hb:1},{k:'pistolR',label:'Pistol Squat R',unit:'Reps',target:5,hb:1},{k:'atgL',label:'ATG Split L',unit:'kg×Rep',hb:1},{k:'atgR',label:'ATG Split R',unit:'kg×Rep',hb:1},{k:'revNordic',label:'Reverse Nordic',unit:'Reps',target:5,hb:1},{k:'dips',label:'Dips Max',unit:'Reps',target:20,hb:1},{k:'weightedDips',label:'Weighted Dips',unit:'kg',hb:1},{k:'pushupsMax',label:'Push-ups Max',unit:'Reps',target:30,hb:1}],
  engine:[{k:'pace',label:'Ø Pace',unit:'min/km',target:5.5,hb:0},{k:'hr',label:'Ø Puls',unit:'bpm',target:140,hb:0},{k:'drift',label:'HF-Drift',unit:'%',target:5,hb:0},{k:'rpe',label:'RPE',unit:'/10',target:6,hb:0}],
  peak:[{k:'wattAvg',label:'Ø Watt',unit:'W',hb:1},{k:'wattMax',label:'Max Watt',unit:'W',hb:1},{k:'rpe',label:'RPE',unit:'/10',target:8,hb:0}],
  skills:[{k:'L-Sit',label:'L-Sit',unit:'s',target:60,hb:1},{k:'Handstand',label:'Handstand',unit:'s',target:30,hb:1},{k:'Frog Stand',label:'Frog Stand',unit:'s',target:60,hb:1},{k:'Muscle-up',label:'Muscle-up',unit:'Reps',target:5,hb:1},{k:'Front Lever',label:'Front Lever',unit:'s',target:10,hb:1},{k:'Back Lever',label:'Back Lever',unit:'s',target:30,hb:1},{k:'Dragon Flag',label:'Dragon Flag',unit:'Reps',target:10,hb:1},{k:'V-Sit',label:'V-Sit',unit:'s',target:30,hb:1},{k:'Planche Hold',label:'Planche Hold',unit:'s',target:10,hb:1}],
  struktur:[{k:'hang',label:'Active Dead Hang',unit:'s',target:60,hb:1},{k:'deepSquat',label:'Deep Squat Hold',unit:'s',target:120,hb:1},{k:'schulter',label:'Schulter-Schmerz',unit:'/10',target:2,hb:0},{k:'knie',label:'Knie-Schmerz',unit:'/10',target:2,hb:0},{k:'ruecken',label:'Rücken-Schmerz',unit:'/10',target:2,hb:0}],
  recovery:[{k:'hrv',label:'HRV',unit:'ms',target:60,hb:1}]
};

const PE_FIELDS=[{k:'bpsfl',label:'BPSFL'},{k:'bpel',label:'BPEL'},{k:'nbel',label:'NBEL'},{k:'mseg',label:'MSEG'},{k:'beg',label:'BEG'}];
const INFO={
  rpe:{title:'RPE – Belastungsempfinden',text:'Rate of Perceived Exertion: 1–10. 1 = kein Aufwand, 10 = Maximum. Ziel Zone 2: RPE 5–6.'},
  drift:{title:'HF-Drift',text:'Prozentuale Pulszunahme bei gleicher Pace. < 5% = starke aerobe Basis.'},
  hrv:{title:'HRV – Herzratenvariabilität',text:'Variation der Herzschlag-Abstände in ms. Höher = bessere Erholung. Ideal: > 60 ms.'},
  hang:{title:'Active Dead Hang',text:'Aktives Hängen mit eingezogenen Schulterblättern. Schultergesundheit & Griffkraft. Ziel: 60s.'},
  weightedDips:{title:'Weighted Dips',text:'Dips mit Zusatzgewicht. Max. Zusatzgewicht für saubere Wiederholungen.'},
  frontlever:{title:'Front Lever',text:'Horizontal an der Stange, Bauch nach unten. Trainiert Lat, Core und Schultern.'},
  backlever:{title:'Back Lever',text:'Wie Front Lever, Bauch nach oben. Einstieg in Lever-Skills.'},
  dragonflag:{title:'Dragon Flag',text:'Körper gestreckt, nur Schultern am Boden. Einer der härtesten Core-Übungen.'},
  vsit:{title:'V-Sit',text:'L-Sit mit gestreckten Beinen. Deutlich schwieriger als L-Sit.'},
  planche:{title:'Planche Hold',text:'Horizontale Stützposition ohne Bodenkontakt. Einer der schwersten Calisthenics-Skills.'},
};
const PERIODS=[['woche','Woche'],['monat','Monat'],['jahr','Jahr'],['all','Alle']];
const LS='cyborg-v1';
const LS_SEC='cyborg-sec-v1';
const DEFAULT_PW_HASH='afc71cb8';

let S={logs:{},targets:{},kpiOrder:{},stack:[{type:'dash'}],modal:null,period:'all',editTarget:false,statsTab:'woche',statsOff:0,importMsg:'',fEx:'pullups',fSkill:'L-Sit',fQual:'ruhig',fNase:false,fMobility:false,showRestore:false,infoKey:null,driftMethod:'haelfte'};
let SEC={unlocked:false,pwHash:DEFAULT_PW_HASH,logs:[],showPwPrompt:false,pwErr:'',secModal:null,editId:null,peView:'charts'};
let bannerTimer=null,secretTaps=0,secretTimer=null;

function uid(){return Math.random().toString(36).slice(2,9);}
function stamp(logs){var o={};for(var k in logs)o[k]=logs[k].map(function(e){return e.id?e:Object.assign({},e,{id:uid()});});return o;}
function hashPw(s){var h=0;for(var i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return(h>>>0).toString(16);}
function lsLoad(){try{var r=localStorage.getItem(LS);if(!r)return false;var d=JSON.parse(r);S.logs=stamp(d.logs||{});S.targets=d.targets||{};S.kpiOrder=d.kpiOrder||{};return true;}catch(e){return false;}}
function lsSave(){try{localStorage.setItem(LS,JSON.stringify({logs:S.logs,targets:S.targets,kpiOrder:S.kpiOrder}));}catch(e){}}
function secLoad(){try{var r=localStorage.getItem(LS_SEC);if(!r)return false;var d=JSON.parse(r);SEC.pwHash=d.pwHash||DEFAULT_PW_HASH;SEC.logs=(d.logs||[]).map(function(e){return e.id?e:Object.assign({},e,{id:uid()});});return true;}catch(e){return false;}}
function secSave(){try{localStorage.setItem(LS_SEC,JSON.stringify({pwHash:SEC.pwHash,logs:SEC.logs}));}catch(e){}}
function totalEntries(){return Object.values(S.logs).reduce(function(s,a){return s+a.length;},0);}

async function shareBackup(){
  var json=JSON.stringify({logs:S.logs,targets:S.targets,kpiOrder:S.kpiOrder,sec:{pwHash:SEC.pwHash,logs:SEC.logs},exportedAt:new Date().toISOString()},null,2);
  var fname='cyborg-'+todayISO()+'.json';
  try{if(navigator.share&&navigator.canShare){var f=new File([json],fname,{type:'application/json'});if(navigator.canShare({files:[f]})){await navigator.share({files:[f],title:'Cyborg KPI Backup'});hideBanner();return;}}
  var b=new Blob([json],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fname;a.click();hideBanner();}
  catch(err){if(err.name!=='AbortError')console.warn(err);}
}
function showBanner(){var b=document.getElementById('bkbanner');if(b)b.style.display='flex';if(bannerTimer)clearTimeout(bannerTimer);bannerTimer=setTimeout(hideBanner,12000);}
function hideBanner(){var b=document.getElementById('bkbanner');if(b)b.style.display='none';if(bannerTimer)clearTimeout(bannerTimer);}
document.getElementById('bkdo').addEventListener('click',function(){shareBackup();});
document.getElementById('bkcl').addEventListener('click',function(){hideBanner();});

function todayISO(){return new Date().toISOString().split('T')[0];}
function fmtD(d){return d.slice(5).replace('-','.');}
function mLbl(d){var m=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];return m[parseInt(d.slice(5,7))-1]+' '+d.slice(0,4);}
function getWeek(off){var base=new Date(),dow=base.getDay()||7,mon=new Date(base);mon.setDate(base.getDate()-dow+1+off*7);var sun=new Date(mon);sun.setDate(mon.getDate()+6);var f=function(d){return d.getDate().toString().padStart(2,'0')+'.'+(d.getMonth()+1).toString().padStart(2,'0');};return{start:mon.toISOString().split('T')[0],end:sun.toISOString().split('T')[0],label:f(mon)+' – '+f(sun)};}
function inR(d,s,e){return d>=s&&d<=e;}
function mRange(off){var b=new Date();b.setDate(1);b.setMonth(b.getMonth()+off);var s=b.getFullYear()+'-'+(b.getMonth()+1).toString().padStart(2,'0')+'-01';var e=new Date(b.getFullYear(),b.getMonth()+1,0).toISOString().split('T')[0];return{start:s,end:e,label:mLbl(s)};}
function cutoff(p){var d=new Date();if(p==='woche')d.setDate(d.getDate()-7);else if(p==='monat')d.setMonth(d.getMonth()-1);else if(p==='jahr')d.setFullYear(d.getFullYear()-1);else return null;return d.toISOString().split('T')[0];}
function getKPIs(sysId){var kpis=KPIS[sysId]||[];var ord=S.kpiOrder[sysId];if(!ord||!ord.length)return kpis;return ord.map(function(k){return kpis.find(function(kpi){return kpi.k===k;});}).filter(Boolean).concat(kpis.filter(function(kpi){return!ord.includes(kpi.k);}));}
function getEnts(sysId,kpiK,logs){var ents=logs[sysId]||[];var res=[];if(sysId==='kraft')res=ents.filter(function(e){return e.exercise===kpiK;}).map(function(e){return{id:e.id,date:e.date,value:e.value,meta:{Technik:(e.technik||'–')+'/5',Schmerz:(e.pain||0)+'/10'},notizen:e.notizen||''};});else if(sysId==='skills')res=ents.filter(function(e){return e.skill===kpiK;}).map(function(e){return{id:e.id,date:e.date,value:e.ist,meta:{Qualität:e.qualitaet,Abbruch:e.abbruch||'–'},notizen:e.notizen||''};});else res=ents.filter(function(e){return e[kpiK]!=null&&!isNaN(+e[kpiK]);}).map(function(e){return{id:e.id,date:e.date,value:parseFloat(e[kpiK]),meta:sysId==='engine'&&kpiK==='pace'?{Nase:e.nase?'Ja':'Nein'}:{},notizen:e.notizen||''};});return res.sort(function(a,b){return a.date.localeCompare(b.date);});}
function prog(val,kpi,targets,sysId){var t=targets[sysId+'.'+kpi.k]!=null?targets[sysId+'.'+kpi.k]:kpi.target;if(!t||val==null)return null;return kpi.hb?Math.min(val/t,1):val<=t?1:Math.max(0,2-val/t);}
function sysSc(sysId,logs,targets){var ps=(KPIS[sysId]||[]).map(function(kpi){var e=getEnts(sysId,kpi.k,logs);return e.length?prog(e[e.length-1].value,kpi,targets,sysId):null;}).filter(function(p){return p!=null;});return ps.length?ps.reduce(function(a,b){return a+b;},0)/ps.length:0;}
function gradeOf(s){return s>=0.8?'Cyborg':s>=0.6?'Hybrid-Athlet':s>=0.4?'Im Aufbau':'Anfänger';}

function ring(p,color,size,sw){var r=(size-sw)/2,c=2*Math.PI*r,d=c*Math.min(Math.max(p||0,0),1);return '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg);display:block;flex-shrink:0"><circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="rgba(120,120,128,.22)" stroke-width="'+sw+'"/><circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-dasharray="'+d.toFixed(2)+' '+(c-d).toFixed(2)+'" stroke-linecap="round"/></svg>';}
function ringWrap(svg,inner,size){return '<div class="rw" style="width:'+size+'px;height:'+size+'px">'+svg+'<div class="rl">'+inner+'</div></div>';}
function chart(data,color,target){
  var W=320,H=78,pad={t:6,r:8,b:18,l:8};
  if(data.length<2)return '<div style="height:'+H+'px;display:flex;align-items:center;justify-content:center"><span style="font-size:12px;color:#3A3A3C">2 Einträge für Chart nötig</span></div>';
  var vals=data.map(function(d){return d.v;});var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(target!=null){mn=Math.min(mn,target);mx=Math.max(mx,target);}
  if(mn===mx){mn-=1;mx+=1;}
  var rng=mx-mn,cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var pxf=function(i){return pad.l+(i/(data.length-1))*cw;};
  var pyf=function(v){return pad.t+ch-((v-mn)/rng)*ch;};
  var cid='c'+uid();
  var ptsData=data.map(function(d,i){return{d:d.d,v:d.v,x:parseFloat(pxf(i).toFixed(1)),y:parseFloat(pyf(d.v).toFixed(1))};});
  var encodedPts=encodeURIComponent(JSON.stringify(ptsData));
  var pts=ptsData.map(function(p){return p.x+','+p.y;}).join(' ');
  var dots=ptsData.map(function(p){return '<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="'+color+'" pointer-events="none"/>';}).join('');
  var ref=target!=null?'<line x1="'+pad.l+'" y1="'+pyf(target).toFixed(1)+'" x2="'+(W-pad.r)+'" y2="'+pyf(target).toFixed(1)+'" stroke="#30D158" stroke-dasharray="3,3" stroke-width="1" pointer-events="none"/>':'';
  return '<div style="margin-top:10px"><svg id="'+cid+'" viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" style="overflow:visible;touch-action:pan-y">'+
    ref+
    '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" pointer-events="none"/>'+
    dots+
    '<line id="'+cid+'-cl" x1="0" y1="'+pad.t+'" x2="0" y2="'+(H-pad.b)+'" stroke="'+color+'" stroke-width="1" stroke-dasharray="2,2" opacity="0" pointer-events="none"/>'+
    '<circle id="'+cid+'-cd" cx="0" cy="0" r="5" fill="'+color+'" stroke="#1C1C1E" stroke-width="2" opacity="0" pointer-events="none"/>'+
    '<rect x="'+pad.l+'" y="0" width="'+cw+'" height="'+H+'" fill="transparent" data-a="chart-scrub" data-cid="'+cid+'" data-pts="'+encodedPts+'" data-w="'+W+'"/>'+
    '<text x="'+pad.l+'" y="'+H+'" font-size="10" fill="#636366" pointer-events="none">'+data[0].d+'</text>'+
    '<text x="'+(W-pad.r)+'" y="'+H+'" font-size="10" fill="#636366" text-anchor="end" pointer-events="none">'+data[data.length-1].d+'</text>'+
    '</svg></div>';
}

// ── Drag sort ───────────────────────────────────────────────────
function setupDragSort(sysId){
  var list=document.querySelector('#kpi-list');if(!list)return;
  var dragEl=null,ghost=null,timer=null,dragging=false,curOrder=null,startY=0;
  function items(){return Array.from(list.querySelectorAll('.li'));}
  function mkGhost(item){var r=item.getBoundingClientRect();var g=document.createElement('div');g.className='drag-ghost';g.style.top=r.top+'px';g.innerHTML=item.innerHTML;document.body.appendChild(g);return g;}
  function atY(y){return items().find(function(el){if(el===dragEl)return false;var r=el.getBoundingClientRect();return y>=r.top&&y<=r.bottom;});}
  list.addEventListener('touchstart',function(e){var item=e.target.closest('.li');if(!item)return;startY=e.touches[0].clientY;timer=setTimeout(function(){dragging=true;dragEl=item;curOrder=getKPIs(sysId).map(function(k){return k.k;});if(navigator.vibrate)navigator.vibrate(30);item.classList.add('dragging');ghost=mkGhost(item);},450);},{passive:true});
  list.addEventListener('touchmove',function(e){if(!dragging||!ghost)return;e.preventDefault();var y=e.touches[0].clientY,dy=y-startY;startY=y;ghost.style.top=(parseFloat(ghost.style.top)+dy)+'px';var tgt=atY(y);if(tgt){var ti=curOrder.indexOf(tgt.dataset.kpiKey),di=curOrder.indexOf(dragEl.dataset.kpiKey);if(ti!==-1&&di!==-1&&ti!==di){curOrder.splice(di,1);curOrder.splice(ti,0,dragEl.dataset.kpiKey);if(di<ti)list.insertBefore(dragEl,tgt.nextSibling);else list.insertBefore(dragEl,tgt);}}}  ,{passive:false});
  function end(){clearTimeout(timer);if(ghost){ghost.remove();ghost=null;}if(dragEl){dragEl.classList.remove('dragging');dragEl=null;}if(dragging&&curOrder){S.kpiOrder[sysId]=curOrder;lsSave();dragging=false;curOrder=null;}}
  list.addEventListener('touchend',end);list.addEventListener('touchcancel',end);
}

function handleSecretTap(){
  secretTaps++;
  if(secretTimer)clearTimeout(secretTimer);
  secretTimer=setTimeout(function(){secretTaps=0;},700);
  if(secretTaps>=5){
    secretTaps=0;
    if(SEC.unlocked){S.stack.push({type:'private'});render();}
    else{SEC.showPwPrompt=true;SEC.pwErr='';render();}
  }
}

    tbl+='<td>'+fmtD(e.date)+'</td>';

    if(e.notizen)tbl+='<tr class="note-row"><td colspan="7">'+e.notizen+'</td></tr>';

  var sorted=SEC.logs.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var dH='<p class="sec">Gesamt-Fortschritt ('+fmtD(sorted[0].date)+' → '+fmtD(sorted[sorted.length-1].date)+')</p><div class="card" style="margin-bottom:10px">';

function vStats(){

      var all=getEnts(s.id,kpi.k,S.logs);

    h+='<div class="ec" style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div class="dot" style="background:'+col+'"></div>'+

      '<span style="font-size:12px;color:'+col+';font-weight:600">'+Math.round(sc*100)+'%</span></div>'+

      '<div style="display:grid;grid-template-columns:1fr 80px 80px;padding:7px 12px;border-bottom:.5px solid rgba(84,84,88,.5)">'+
      '<span style="font-size:10px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:.4px">KPI</span>'+
      '<span style="font-size:10px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:.4px;text-align:right">Jetzt</span>'+
      '<span style="font-size:10px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:.4px;text-align:right">Vorher</span></div>'+
      rows.map(function(row){return '<div class="sr"><span style="font-size:13px;color:#ebebf5">'+row.kpi.label+'</span>'+
        '<span style="font-size:14px;font-weight:700;color:'+(row.cv!=null?'#fff':'#48484A')+';text-align:right">'+(row.cv!=null?row.cv:'–')+
        (row.cv!=null&&row.pos!=null?'<span style="font-size:10px;margin-left:3px;color:'+(row.pos>0?'#30D158':row.pos<0?'#FF453A':'#636366')+';font-weight:600">'+(row.pos>0?'▲':row.pos<0?'▼':'→')+'</span>':'')+

  });
  return h;
}

function render(){
  var cur=S.stack[S.stack.length-1],showBack=S.stack.length>1;
  var curSys=cur.sysId?SM.find(function(s){return s.id===cur.sysId;}):null;
  var curKpi=cur.kpiK&&KPIS[cur.sysId]?KPIS[cur.sysId].find(function(k){return k.k===cur.kpiK;}):null;
  var isPrivate=cur.type==='private';
  var title=cur.type==='dash'?'Dashboard':cur.type==='stats'?'Statistik':cur.type==='daten'?'Daten':isPrivate?'Privat':cur.type==='sys'?(curSys&&curSys.label)||'':curKpi?curKpi.label:'';
  var sub=cur.type==='sys'&&curSys?curSys.desc:cur.type==='kpi'&&curSys?curSys.label:'';
  var addCol=isPrivate?'#5E5CE6':(cur.sysId?COL[cur.sysId]:'#0A84FF');
  var showAdd=isPrivate||(cur.type==='sys'||cur.type==='kpi')&&cur.sysId;
  var addAction=isPrivate?'pe-add-open':'open-modal';
  var addSys=isPrivate?'':'data-sys="'+cur.sysId+'"';
  var view='';
  if(cur.type==='dash')view=vDash();
  else if(cur.type==='sys')view=vSys(cur.sysId);
  else if(cur.type==='kpi')view=vKPI(cur.sysId,cur.kpiK);
  else if(cur.type==='stats')view=vStats();
  else if(cur.type==='daten')view=vDaten();
  else if(isPrivate)view=vPE();

  var backColor=isPrivate?'#5E5CE6':'#0A84FF';
  var TABS=[{id:'dash',icon:'⊞',l:'Dashboard'},{id:'add',icon:'+',l:'Eintrag'},{id:'stats',icon:'◎',l:'Statistik'},{id:'daten',icon:'↕',l:'Daten'}];
  document.getElementById('app').innerHTML=
    '<div class="hdr">'+
    (showBack?'<button class="back" style="color:'+backColor+'" data-a="back">‹ Zurück</button>':'')+
    '<div class="hdr-row"><div>'+(sub?'<p class="pg-sub">'+sub+'</p>':'')+
    '<h1 class="pg-title">'+title+'</h1></div>'+
    (showAdd?'<button class="add-btn" style="background:'+addCol+'" data-a="'+addAction+'" '+addSys+'>+ Eintrag</button>':'')+
    '</div></div>'+
    '<div class="content">'+view+'</div>'+
    '<div class="nav">'+TABS.map(function(t){var active=(t.id==='dash'&&cur.type==='dash')||(t.id==='stats'&&cur.type==='stats')||(t.id==='daten'&&cur.type==='daten');return '<button class="nb" data-a="nav-tab" data-tab="'+t.id+'"><div class="ni" style="background:'+(active?'#0A84FF':t.id==='add'?'rgba(255,59,48,.85)':'rgba(84,84,88,.3)')+';font-size:'+(t.id==='add'?'20px':'14px')+'">'+t.icon+'</div><span class="nl" style="color:'+(active?'#0A84FF':'#636366')+'">'+t.l+'</span></button>';}).join('')+'</div>'+
    (isPrivate?'<div style="position:fixed;bottom:115px;right:16px;left:auto;display:flex;gap:8px;z-index:101">'+
      '<button style="background:rgba(44,44,46,.95);backdrop-filter:blur(10px);border:none;border-radius:12px;padding:8px 14px;font-size:11px;color:#636366;cursor:pointer;font-family:inherit" data-a="sec-change-pw">🔑 Passwort</button>'+
      '<button style="background:rgba(44,44,46,.95);backdrop-filter:blur(10px);border:none;border-radius:12px;padding:8px 14px;font-size:11px;color:#636366;cursor:pointer;font-family:inherit" data-a="sec-lock">🔒 Sperren</button></div>':'')+
    (S.modal?'<div class="ov" id="ov"><div class="ms"><div class="mh"></div>'+renderModal()+'</div></div>':'')+
    (S.showRestore?renderRestoreOverlay():'')+
    (S.infoKey?renderInfoOverlay():'')+
    (SEC.showPwPrompt?renderPwPrompt():'')+
    renderSecModal();
  if(cur.type==='sys')setTimeout(function(){setupDragSort(cur.sysId);},50);
  if(SEC.showPwPrompt)setTimeout(function(){var p=document.getElementById('pwInput');if(p)p.focus();},100);
}

function addEntry(sysId,entry){if(!S.logs[sysId])S.logs[sysId]=[];S.logs[sysId].push(Object.assign({},entry,{id:uid()}));lsSave();S.modal=null;render();setTimeout(showBanner,400);}
function delEntry(sysId,eid){if(!S.logs[sysId])return;S.logs[sysId]=S.logs[sysId].filter(function(e){return e.id!==eid;});lsSave();render();}

function setupFileImport(cb){
  var fi=document.getElementById('fi');fi.onchange=null;fi.value='';
  fi.onchange=function(){var f=fi.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.logs)throw new Error();S.logs=stamp(d.logs||{});S.targets=d.targets||{};S.kpiOrder=d.kpiOrder||{};if(d.sec){SEC.pwHash=d.sec.pwHash||DEFAULT_PW_HASH;SEC.logs=(d.sec.logs||[]).map(function(e){return e.id?e:Object.assign({},e,{id:uid()});});}lsSave();secSave();S.showRestore=false;if(cb)cb(true);}catch(err){if(cb)cb(false);}};r.readAsText(f);};fi.click();
}

document.getElementById('app').addEventListener('click',function(e){
  if(e.target.id==='ov'){S.modal=null;render();return;}
  if(e.target.id==='infov'){S.infoKey=null;render();return;}
  var el=e.target.closest('[data-a]');if(!el)return;
  var a=el.dataset.a;
  // secret
  if(a==='secret-tap'){handleSecretTap();return;}
  if(a==='sec-pw-close'){SEC.showPwPrompt=false;render();return;}
  if(a==='sec-unlock'){var pw=document.getElementById('pwInput');if(pw&&hashPw(pw.value)===SEC.pwHash){SEC.unlocked=true;SEC.showPwPrompt=false;S.stack.push({type:'private'});render();}else{SEC.pwErr='Falsches Passwort';render();}return;}
  if(a==='sec-lock'){SEC.unlocked=false;if(S.stack[S.stack.length-1].type==='private')S.stack.pop();render();return;}
  if(a==='sec-change-pw'){SEC.secModal='changepw';SEC.pwErr='';render();return;}
  if(a==='sec-save-pw'){var p1=document.getElementById('pw1'),p2=document.getElementById('pw2');if(!p1||!p2||!p1.value){SEC.pwErr='Bitte Passwort eingeben';render();return;}if(p1.value!==p2.value){SEC.pwErr='Passwörter stimmen nicht überein';render();return;}SEC.pwHash=hashPw(p1.value);secSave();SEC.secModal=null;SEC.pwErr='';render();return;}
  if(a==='sec-modal-close'){SEC.secModal=null;render();return;}
  if(a==='pe-view'){SEC.peView=el.dataset.view;render();return;}
  if(a==='pe-add-open'){SEC.secModal='add';SEC.editId=null;render();return;}
  if(a==='pe-edit'){SEC.secModal='edit';SEC.editId=el.dataset.eid;render();return;}
  if(a==='pe-save'){var v0=getVals();var entry={id:SEC.editId||uid(),date:v0['pe-date']||todayISO(),notizen:v0['pe-notizen']||''};PE_FIELDS.forEach(function(f){var val=parseFloat(v0['pe-'+f.k]);if(!isNaN(val))entry[f.k]=val;});if(SEC.editId){SEC.logs=SEC.logs.map(function(x){return x.id===SEC.editId?entry:x;});}else{SEC.logs.push(entry);}secSave();SEC.secModal=null;render();return;}
  if(a==='pe-delete'){if(confirm('Eintrag löschen?')){SEC.logs=SEC.logs.filter(function(x){return x.id!==el.dataset.eid;});secSave();SEC.secModal=null;render();}return;}
  // normal
  if(a==='show-info'){S.infoKey=el.dataset.info;render();return;}
  if(a==='close-info'){S.infoKey=null;render();return;}
  if(a==='back'){S.stack.pop();S.period='all';S.editTarget=false;render();return;}
  if(a==='nav-tab'){var tab=el.dataset.tab;if(tab==='add'){S.modal='pick';S.fNase=false;S.fMobility=false;S.fQual='ruhig';render();}else{S.stack=[{type:tab}];render();}return;}
  if(a==='nav-sys'){S.stack.push({type:'sys',sysId:el.dataset.sys});render();return;}
  if(a==='nav-kpi'){S.stack.push({type:'kpi',sysId:el.dataset.sys,kpiK:el.dataset.kpi});S.period='all';S.editTarget=false;render();return;}
  if(a==='open-modal'){S.modal=el.dataset.sys;S.fNase=false;S.fMobility=false;S.fQual='ruhig';render();return;}
  if(a==='close-modal'){S.modal=null;render();return;}
  if(a==='modal-sys'){S.modal=el.dataset.sys;rerenderMs();return;}
  if(a==='tog'){S[el.dataset.key]=!S[el.dataset.key];rerenderMs();setTimeout(setupDriftCalc,50);return;}
  if(a==='drift-method'){S.driftMethod=el.dataset.method;rerenderMs();setTimeout(setupDriftCalc,50);return;}
  if(a==='set-qual'){S.fQual=el.dataset.qual;rerenderMs();return;}
  if(a==='set-period'){S.period=el.dataset.period;render();return;}
  if(a==='stats-tab'){S.statsTab=el.dataset.tab;S.statsOff=0;render();return;}
  if(a==='stats-off'){var dir=parseInt(el.dataset.dir);if(S.statsOff+dir<=0)S.statsOff+=dir;render();return;}
  if(a==='edit-target'){S.editTarget=true;render();return;}
  if(a==='cancel-target'){S.editTarget=false;render();return;}
  if(a==='save-target'){var cur2=S.stack[S.stack.length-1];var tv=parseFloat(document.getElementById('ti').value);if(!isNaN(tv)){S.targets[cur2.sysId+'.'+cur2.kpiK]=tv;lsSave();}S.editTarget=false;render();return;}
  if(a==='del-entry'){if(confirm('Eintrag löschen?'))delEntry(el.dataset.sys,el.dataset.eid);return;}
  if(a==='exp-json'){exportJSON();return;}
  if(a==='exp-csv'){exportCSV();return;}
  if(a==='share-backup'){shareBackup();return;}
  if(a==='imp-json'){setupFileImport(function(ok){S.importMsg=ok?'✓ Backup erfolgreich geladen':'✗ Fehler beim Laden';render();setTimeout(function(){S.importMsg='';render();},3000);});return;}
  if(a==='restore-pick'){setupFileImport(function(ok){if(ok){S.showRestore=false;render();}else alert('Fehler beim Laden.');});return;}
  if(a==='restore-skip'){S.showRestore=false;render();return;}
  var v=getVals();
  if(a==='save-kraft'){addEntry('kraft',{date:todayISO(),exercise:v.fEx||'pullups',value:parseFloat(v.value)||0,technik:parseFloat(v.technik)||3,pain:parseFloat(v.pain)||0,notizen:v.notizen||''});S.fEx=v.fEx||'pullups';return;}
  if(a==='save-engine'){var h1v=parseFloat(v.hr1)||0,h2v=parseFloat(v.hr2)||0;var drift=h1v>0?parseFloat(((h2v-h1v)/h1v*100).toFixed(1)):0;addEntry('engine',{date:todayISO(),pace:parseFloat(v.pace)||0,hr:parseFloat(v.hr)||0,drift:drift,rpe:parseFloat(v.rpe)||0,nase:S.fNase,notizen:v.notizen||''});return;}
  if(a==='save-peak'){addEntry('peak',{date:todayISO(),wattAvg:parseFloat(v.wattAvg)||0,wattMax:parseFloat(v.wattMax)||0,rpe:parseFloat(v.rpe)||0,notizen:v.notizen||''});return;}
  if(a==='save-skills'){addEntry('skills',{date:todayISO(),skill:v.fSkill||'L-Sit',ist:parseFloat(v.ist)||0,qualitaet:S.fQual,abbruch:v.abbruch||'',notizen:v.notizen||''});S.fSkill=v.fSkill||'L-Sit';return;}
  if(a==='save-struktur'){addEntry('struktur',{date:todayISO(),hang:parseFloat(v.hang)||0,deepSquat:parseFloat(v.deepSquat)||0,schulter:parseFloat(v.schulter)||0,knie:parseFloat(v.knie)||0,ruecken:parseFloat(v.ruecken)||0,mobility:S.fMobility,notizen:v.notizen||''});return;}
  if(a==='save-recovery'){addEntry('recovery',{date:todayISO(),hrv:parseFloat(v.hrv)||0,notizen:v.notizen||''});return;}
});

function setupChartScrub(){
  var tip=document.createElement('div');
  tip.id='chart-tooltip';
  tip.style.cssText='position:fixed;background:rgba(44,44,46,.97);backdrop-filter:blur(10px);border:.5px solid rgba(84,84,88,.5);border-radius:10px;padding:6px 12px;font-size:12px;color:#fff;pointer-events:none;z-index:999;white-space:nowrap;transform:translateX(-50%);opacity:0;transition:opacity .1s;display:none';
  document.body.appendChild(tip);
  var active=null,hideTimer=null;

  function getNearest(el,touchX){
    var svg=document.getElementById(el.dataset.cid);if(!svg)return null;
    var pts=JSON.parse(decodeURIComponent(el.dataset.pts));
    var rect=svg.getBoundingClientRect();
    var scale=parseFloat(el.dataset.w)/rect.width;
    var relX=(touchX-rect.left)*scale;
    return pts.reduce(function(best,p){return Math.abs(p.x-relX)<Math.abs(best.x-relX)?p:best;},pts[0]);
  }

  function showScrub(el,touch){
    var nearest=getNearest(el,touch.clientX);if(!nearest)return;
    var svg=document.getElementById(el.dataset.cid);
    var rect=svg.getBoundingClientRect();
    var scale=rect.width/parseFloat(el.dataset.w);
    var cl=document.getElementById(el.dataset.cid+'-cl');
    var cd=document.getElementById(el.dataset.cid+'-cd');
    if(cl){cl.setAttribute('x1',nearest.x);cl.setAttribute('x2',nearest.x);cl.setAttribute('opacity','0.5');}
    if(cd){cd.setAttribute('cx',nearest.x);cd.setAttribute('cy',nearest.y);cd.setAttribute('opacity','1');}
    var tipX=rect.left+nearest.x*scale;
    var tipY=rect.top+nearest.y*scale;
    tip.innerHTML='<span style="color:#8E8E93;margin-right:6px">'+nearest.d+'</span><span style="font-weight:700">'+nearest.v+'</span>';
    tip.style.left=tipX+'px';
    tip.style.top=Math.max(8,tipY-44)+'px';
    tip.style.display='block';
    requestAnimationFrame(function(){tip.style.opacity='1';});
  }

  function hideScrub(){
    if(active){
      var cl=document.getElementById(active.dataset.cid+'-cl');
      var cd=document.getElementById(active.dataset.cid+'-cd');
      if(cl)cl.setAttribute('opacity','0');
      if(cd)cd.setAttribute('opacity','0');
    }
    tip.style.opacity='0';
    setTimeout(function(){tip.style.display='none';},150);
    active=null;
  }

  document.addEventListener('touchstart',function(e){
    var el=e.target.closest('[data-a="chart-scrub"]');if(!el)return;
    if(hideTimer)clearTimeout(hideTimer);
    active=el;
    showScrub(el,e.touches[0]);
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!active)return;
    showScrub(active,e.touches[0]);
  },{passive:true});

  document.addEventListener('touchend',function(){
    if(!active)return;
    hideTimer=setTimeout(hideScrub,1200);
  },{passive:true});
}

async function reqPersist(){if(navigator.storage&&navigator.storage.persist)await navigator.storage.persist();}
reqPersist();
setupChartScrub();
lsLoad();
secLoad();


render();
})();
</script>
